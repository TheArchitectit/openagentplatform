# =============================================================================
# OpenAgentPlatform — NATS Leaf Node Configuration for Agents
# =============================================================================
# This config is used by agent-side NATS leaf nodes. It connects to the
# central NATS cluster over mTLS using the agent's SPIFFE-issued certificate.
#
# Usage:
#   nats-server --config /etc/nats/leaf.conf
#
# Required files (mounted or copied by the agent runtime):
#   /etc/nats/certs/ca.pem           — Root CA (shared with cluster)
#   /etc/nats/certs/agent-cert.pem   — Agent leaf certificate (SPIFFE SAN)
#   /etc/nats/certs/agent-key.pem    — Agent leaf private key
# =============================================================================

server_name: "${AGENT_NAME:-oap-agent-leaf}"
listen: "127.0.0.1:4222"

log_level: info
logtime: true

# -----------------------------------------------------------------------------
# TLS — agent identity via SPIFFE certificate
# -----------------------------------------------------------------------------
tls {
  cert_file:      "/etc/nats/certs/agent-cert.pem"
  key_file:       "/etc/nats/certs/agent-key.pem"
  ca_file:        "/etc/nats/certs/ca.pem"
  verify:         true
  verify_and_map: true
  cipher_suites: [
    "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384",
    "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384",
    "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256",
    "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
  ]
  min_version: "1.2"
}

# -----------------------------------------------------------------------------
# Leaf Node — connects to the OAP central cluster
# -----------------------------------------------------------------------------
leafnodes {
  remotes [
    {
      # The central NATS cluster endpoint
      url: "tls://${NATS_CLUSTER_HOST:-nats}:7422"

      # Use the same SPIFFE cert to authenticate this leaf to the cluster
      tls {
        cert_file: "/etc/nats/certs/agent-cert.pem"
        key_file:  "/etc/nats/certs/agent-key.pem"
        ca_file:   "/etc/nats/certs/ca.pem"
      }

      # Bind agent traffic to the Agent account on the cluster
      # The SPIFFE ID in agent-cert.pem is verified_and_map'd to the
      # Agent account by the cluster's authorization config.
    }
  ]
}

# -----------------------------------------------------------------------------
# JetStream — local caching / replay (optional)
# -----------------------------------------------------------------------------
# Uncomment to enable local JetStream for offline replay or caching:
#
# jetstream {
#   store_dir: "/data/jetstream-leaf"
#   max_mem:   "256M"
#   max_file:  "1G"
# }
