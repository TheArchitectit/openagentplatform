# =============================================================================
# OpenAgentPlatform — NATS Server Configuration
# =============================================================================
# mTLS + SPIFFE identity mapping for multi-account agent communication.
# Docs: https://docs.nats.io/running-a-nats-service/configuration/securing_nats
# =============================================================================

server_name: "oap-nats"
listen: "0.0.0.0:4222"
http_port: 8222

log_level: info
logtime: true

# -----------------------------------------------------------------------------
# JetStream — persistent messaging layer
# -----------------------------------------------------------------------------
jetstream {
  store_dir: "/data/jetstream"
  max_mem:   "2G"
  max_file:  "10G"
}

# -----------------------------------------------------------------------------
# TLS — mutual authentication with SPIFFE support
# -----------------------------------------------------------------------------
tls {
  cert_file:      "/etc/nats/certs/server-cert.pem"
  key_file:       "/etc/nats/certs/server-key.pem"
  ca_file:        "/etc/nats/certs/ca.pem"
  verify:         true
  verify_and_map: true
  # Only allow modern cipher suites
  cipher_suites: [
    "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384",
    "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384",
    "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256",
    "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
  ]
  curve_preferences: ["X25519", "CurveP384", "CurveP256"]
  min_version: "1.2"
}

# -----------------------------------------------------------------------------
# Accounts — tenant isolation boundary
# -----------------------------------------------------------------------------
accounts {
  # System account for NATS internal monitoring
  $SYS {
    users = [
      { user: "sys", password: "$SYS_PASSWORD" }
    ]
  }

  # OAP — platform server & OIDC-authenticated human users
  OAP {
    users = [
      # Platform server (static creds from secrets manager)
      { user: "oap-server", password: "$OAP_SERVER_PASSWORD" }
    ]
    # OIDC users are mapped dynamically via authorization block below
    exports = [
      { service: "oap.>", accounts: ["Agent", "A2A"] }
      { stream: "oap.events.>" }
    ]
  }

  # Agent — SPIFFE-authenticated AI agents
  Agent {
    users = [
      # SPIFFE-mapped agents are injected dynamically via verify_and_map
      # This static user is a fallback for local dev only
      { user: "agent-local", password: "$AGENT_LOCAL_PASSWORD" }
    ]
    imports = [
      { service: { subject: "oap.>", account: "OAP" }, to: "oap.>" }
      { stream: { subject: "oap.events.>", account: "OAP" } }
    ]
    exports = [
      { stream: "agent.status.>" }
      { service: "agent.invoke.>" }
    ]
  }

  # A2A — agent-to-agent peering federation
  A2A {
    users = [
      # Peer gateways authenticate via mTLS + SPIFFE
      { user: "a2a-gateway", password: "$A2A_GATEWAY_PASSWORD" }
    ]
    imports = [
      { service: { subject: "oap.>", account: "OAP" }, to: "federation.oap.>" }
      { stream: { subject: "agent.status.>", account: "Agent" } }
    ]
    exports = [
      { service: "a2a.>" }
    ]
  }
}

# -----------------------------------------------------------------------------
# Authorization — maps TLS client identity to accounts
# -----------------------------------------------------------------------------
#
# When verify_and_map is enabled, NATS extracts the identity from the TLS
# client certificate (CN, or the SPIFFE URI from SAN). That identity is then
# matched against the users defined in each account.
#
# SPIFFE mapping strategy:
#   spiffe://openagentplatform/agent/<id>   -> Agent account
#   spiffe://openagentplatform/a2a/<id>     -> A2A account
#   spiffe://openagentplatform/user/<email> -> OAP account
#
# For production OIDC users, the platform server issues short-lived NKEYs or
# credentials through the OAP credential exchange endpoint. These are
# registered dynamically against the OAP account.

authorization {
  # Default account for unmatched clients (reject connection)
  users = []

  # OIDC users — authenticated via platform token exchange
  # The server creates ephemeral NATS credentials and passes them to the
  # client. These users land in the OAP account.
  #
  # For SPIFFE-based mapping, the TLS certificate's URI SAN is used:
  #   spiffe://openagentplatform/agent/<name>  -> Agent account
  #   spiffe://openagentplatform/a2a/<peer>     -> A2A account
  #
  # Certificate-to-account mapping happens in the users arrays above.
  # NATS matches the cert identity against the user field when
  # verify_and_map is true.
  #
  # SPIFFE mapping reference: deploy/nats/scripts/spiffe-mappings.json
}

# -----------------------------------------------------------------------------
# Cluster — intra-cluster peering
# -----------------------------------------------------------------------------
cluster {
  name:   "openagentplatform"
  listen: "0.0.0.0:6222"

  # Cluster peers authenticate via mTLS
  tls {
    cert_file:      "/etc/nats/certs/server-cert.pem"
    key_file:       "/etc/nats/certs/server-key.pem"
    ca_file:        "/etc/nats/certs/ca.pem"
    verify:         true
    verify_and_map: true
  }

  # Routes populated by orchestration (e.g., Kubernetes headless service)
  # or by static list in smaller deployments
  routes = []
}

